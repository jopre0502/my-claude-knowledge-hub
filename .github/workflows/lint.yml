name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on hooks and commands
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: |
            ./hooks
            ./commands

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint on root docs
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            *.md
            docs/**/*.md
